<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Yasmine 🎂</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap');

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#ffd6e8,#c9b8f8);
  font-family: 'Quicksand', sans-serif;
  overflow: hidden;
}

.card {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 25px;
  text-align: center;
  width: 90%;
  max-width: 400px;
  position: relative;
}

.sprite img {
  width: 150px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

h1 {
  font-family: 'Pacifico';
  color: #c0447a;
}

p {
  color: #7a4070;
}

.buttons {
  margin-top: 20px;
  position: relative;
  height: 120px;
}

button {
  border: none;
  border-radius: 50px;
  padding: 12px 30px;
  font-weight: bold;
  cursor: pointer;
}

#yes {
  background: #e91e8c;
  color: white;
}

#no {
  position: absolute;
  background: #ddd;
}

/* FINAL SCREEN */
#final {
  display: none;
}
</style>
</head>

<body>

<div class="card">

<div id="screen1">
  <div class="sprite">
    <!-- YOUR CHARACTER IMAGE -->
    <img src="1000048714.png" alt="character">
  </div>

  <h1>Happy Birthday Yasmine 🌸</h1>
  <p>I have a gift for you… but first say YES 😏</p>

  <div class="buttons">
    <button id="yes">YES ✨</button>
    <button id="no">No</button>
  </div>
</div>

<div id="final">
  <h1>Yayyy 🥰</h1>
  <p>Your gift is… a date ☕✨</p>
</div>

</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const screen1 = document.getElementById("screen1");
const final = document.getElementById("final");

// Move NO button randomly
function moveNo() {
  const parent = noBtn.parentElement;
  const maxX = parent.clientWidth - noBtn.offsetWidth;
  const maxY = parent.clientHeight - noBtn.offsetHeight;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

// Works on PC + phone
noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("touchstart", moveNo);
noBtn.addEventListener("click", moveNo);

// YES button
yesBtn.onclick = () => {
  screen1.style.display = "none";
  final.style.display = "block";
};
</script>

</body>
</html>
